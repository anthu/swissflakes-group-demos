version: 2

models:
  - name: sfg_logistics_orders
    description: >
      Organization listing that shares order data with all accounts in the
      organization.
    config:
      materialized: organization_listing
      meta:
        share_name: SFG_LOGISTICS_ORDERS
        listing_name: SFG_LOGISTICS_ORDERS
        publish: false
        listing_manifest:
          title: "SwissFlakes Logistics -- Orders"
          description: |
            Orders data product from SwissFlakes Logistics AG.

            **Data Tables:**
            - **MART_ORDER_SUMMARY** -- order headers with line item aggregations
          organization_profile: "INTERNAL"
          organization_targets:
            access:
              - all_internal_accounts: true
          locations:
            access_regions:
              - name: "ALL"
          auto_fulfillment:
            refresh_type: "SUB_DATABASE"
            refresh_schedule: "10 MINUTE"
