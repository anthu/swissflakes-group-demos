version: 2

models:
  - name: sfg_logistics_locations
    description: >
      Organization listing that shares warehouse and location data with all
      accounts in the organization.
    config:
      materialized: organization_listing
      meta:
        share_name: SFG_LOGISTICS_LOCATIONS
        listing_name: SFG_LOGISTICS_LOCATIONS
        publish: false
        listing_manifest:
          title: "SwissFlakes Logistics -- Locations"
          description: |
            Locations data product from SwissFlakes Logistics AG.

            **Data Tables:**
            - **MART_WAREHOUSE_CAPACITY** -- warehouse zones and capacity utilization
          organization_profile: "INTERNAL"
          organization_targets:
            access:
              - all_internal_accounts: true
          locations:
            access_regions:
              - name: "ALL"
          auto_fulfillment:
            refresh_type: "SUB_DATABASE"
            refresh_schedule: "10 MINUTE"
