version: 2

models:
  - name: sfg_logistics_locations
    description: >
      Organization listing that shares warehouse and location data with all
      accounts in the organization.
    config:
      materialized: organization_listing
      meta:
        share_name: SFG_LOGISTICS_LOCATIONS
        listing_name: SFG_LOGISTICS_LOCATIONS
        publish: false
        listing_manifest:
          title: "⚜️ SwissFlakes Logistics – Locations"
          description: |
            ## Overview

            Gold-tier mart for warehouse footprint and zone-level pallet capacity. Use for network planning, capacity heatmaps, and fulfillment routing.

            ## What's included

            - **MART_WAREHOUSE_CAPACITY**: address, coordinates, declared capacity, zone mix (storage, cold, hazmat, receiving, loading, returns), and aggregates such as `total_zone_capacity_pallets`.

            ## Refresh and sharing

            Auto-fulfillment uses `SUB_DATABASE` with a 10-minute schedule. Rebuild via `dbt_locations`.

            ## Quality

            Mart layer is tagged **GOLD** under the group `DATA_QUALITY` convention.
          organization_profile: "INTERNAL"
          resources:
            documentation: "https://docs.snowflake.com/en/progaccess/listing-manifest-reference"
          data_dictionary:
            featured:
              database: SFG_LOGISTICS
              objects:
                - name: MART_WAREHOUSE_CAPACITY
                  schema: MART_LOCATIONS
                  domain: TABLE
          data_preview:
            has_pii: false
          usage_examples:
            - title: "Active warehouses by canton"
              description: "Count active sites per canton."
              query: >
                SELECT canton, COUNT(*) AS warehouse_count
                FROM SFG_LOGISTICS.MART_LOCATIONS.MART_WAREHOUSE_CAPACITY
                WHERE is_active = TRUE
                GROUP BY 1
                ORDER BY warehouse_count DESC;
            - title: "Temperature-controlled capacity"
              description: "Warehouses with cold-zone pallet capacity."
              query: >
                SELECT warehouse_name, city, cold_capacity_pallets, temp_controlled_zones
                FROM SFG_LOGISTICS.MART_LOCATIONS.MART_WAREHOUSE_CAPACITY
                WHERE cold_capacity_pallets > 0
                ORDER BY cold_capacity_pallets DESC
                LIMIT 30;
          organization_targets:
            discovery:
              - all_internal_accounts: true
            access:
              - all_internal_accounts: true
          support_contact: "anton.huck+lgs@snowflake.com"
          approver_contact: "anton.huck+lgs@snowflake.com"
          locations:
            access_regions:
              - name: "ALL"
          auto_fulfillment:
            refresh_type: "SUB_DATABASE"
            refresh_schedule: "10 MINUTE"
