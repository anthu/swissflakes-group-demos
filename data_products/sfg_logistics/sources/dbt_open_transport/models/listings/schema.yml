version: 2

models:
  - name: sfg_logistics_open_transport
    description: >
      Organization listing that shares Swiss public transport data with all
      accounts in the organization.
    config:
      materialized: organization_listing
      meta:
        share_name: SFG_LOGISTICS_OPEN_TRANSPORT
        listing_name: SFG_LOGISTICS_OPEN_TRANSPORT
        publish: false
        listing_manifest:
          title: "SwissFlakes Logistics -- Open Transport"
          description: |
            Open transport data product from SwissFlakes Logistics AG,
            sourced from Swiss public transport APIs (SBB, transport.opendata.ch).

            **Data Tables:**
            - **MART_SWISS_RAIL_OVERVIEW** -- Swiss rail connections and stationboard data
          organization_profile: "INTERNAL"
          organization_targets:
            access:
              - all_internal_accounts: true
          locations:
            access_regions:
              - name: "ALL"
          auto_fulfillment:
            refresh_type: "SUB_DATABASE"
            refresh_schedule: "10 MINUTE"
