version: 2

models:
  - name: sfg_logistics_products
    description: >
      Organization listing that shares product catalog data with all accounts
      in the organization.
    config:
      materialized: organization_listing
      meta:
        share_name: SFG_LOGISTICS_PRODUCTS
        listing_name: SFG_LOGISTICS_PRODUCTS
        publish: false
        listing_manifest:
          title: "⚜️ SwissFlakes Logistics – Products"
          description: |
            ## Overview

            Gold-tier product catalog with harmonized tariff and landed-cost fields. Use for pricing analytics, customs classification review, and hazardous-goods reporting.

            ## What's included

            - **MART_PRODUCT_CATALOG**: product attributes, HS code, duty and VAT rates, preferential rates, computed duty and VAT amounts, and `total_landed_cost_chf`.

            ## Refresh and sharing

            Auto-fulfillment uses `SUB_DATABASE` with a 10-minute schedule. Rebuild via `dbt_products`.

            ## Quality

            Mart layer is tagged **GOLD** under the group `DATA_QUALITY` convention.
          organization_profile: "INTERNAL"
          resources:
            documentation: "https://docs.snowflake.com/en/progaccess/listing-manifest-reference"
          data_dictionary:
            featured:
              database: SFG_LOGISTICS
              objects:
                - name: MART_PRODUCT_CATALOG
                  schema: MART_PRODUCTS
                  domain: TABLE
          data_preview:
            has_pii: false
          usage_examples:
            - title: "Products requiring customs declaration"
              description: "Rows where a customs declaration is required."
              query: >
                SELECT product_id, product_name, hs_code, origin_country
                FROM SFG_LOGISTICS.MART_PRODUCTS.MART_PRODUCT_CATALOG
                WHERE requires_customs_declaration = TRUE
                ORDER BY product_name
                LIMIT 50;
            - title: "Average landed cost by category"
              description: "Mean landed cost in CHF per product category."
              query: >
                SELECT category, ROUND(AVG(total_landed_cost_chf), 2) AS avg_landed_chf
                FROM SFG_LOGISTICS.MART_PRODUCTS.MART_PRODUCT_CATALOG
                GROUP BY 1
                ORDER BY avg_landed_chf DESC;
          organization_targets:
            discovery:
              - all_internal_accounts: true
            access:
              - all_internal_accounts: true
          support_contact: "anton.huck+lgs@snowflake.com"
          approver_contact: "anton.huck+lgs@snowflake.com"
          locations:
            access_regions:
              - name: "ALL"
          auto_fulfillment:
            refresh_type: "SUB_DATABASE"
            refresh_schedule: "10 MINUTE"
