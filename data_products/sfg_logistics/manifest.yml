manifest_version: 2
type: DCM_PROJECT

default_target: PROD

templating:
  defaults:
    dp_type: "DOMAIN"
    dp_name: "SFG_LOGISTICS"
    dp_description: "SwissFlakes Logistics AG domain - commerce and transport data products"

  configurations:
    DEV:
      env_suffix: "_DEV"
    PROD:
      env_suffix: ""

targets:
  DEV:
    account_identifier: "{{ env_var('SNOWFLAKE_ACCOUNT_DEV') }}"
    project_name: 'SFG_LOGISTICS_DEV.DCM.DP_SFG_LOGISTICS'
    project_owner: DP_SFG_LOGISTICS_DEV_OWNER
    project_comment: "{{dp_type}} Data Product: {{dp_description}}"
    templating_config: DEV

  PROD:
    account_identifier: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
    project_name: 'SFG_LOGISTICS.DCM.DP_SFG_LOGISTICS'
    project_owner: DP_SFG_LOGISTICS_OWNER
    project_comment: "{{dp_type}} Data Product: {{dp_description}}"
    templating_config: PROD
