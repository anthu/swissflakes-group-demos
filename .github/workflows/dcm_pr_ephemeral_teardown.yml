name: DCM PR Ephemeral Teardown

on:
  pull_request:
    types: [closed]
    branches: ["main"]

  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to tear down (for manual cleanup)'
        required: true
        type: string

env:
  DCM_PROJECT_PATH: data_products/sfg_logistics/
  SNOWFLAKE_PASSWORD: ${{ secrets.DEPLOYER_PAT }}
  SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
  SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_CI_ROLE: ${{ vars.SNOWFLAKE_CI_ROLE }}
  PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  TEARDOWN:
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_CI_ROLE }}
    steps:
    - name: Clone Repo
      uses: actions/checkout@v4

    - name: Setup SnowCLI
      run: pip install git+https://github.com/snowflakedb/snowflake-cli.git

    - name: Drop DCM project
      run: |
        cd ./$DCM_PROJECT_PATH
        set +e
        snow dcm drop --target PR_EPHEMERAL --if-exists -x 2>&1
        set -e
        echo "DCM project dropped (or did not exist)" >> $GITHUB_STEP_SUMMARY

    - name: Drop ephemeral database
      run: |
        snow sql -q "DROP DATABASE IF EXISTS SFG_LOGISTICS_PR${{ env.PR_NUMBER }}" -x
        echo "Database SFG_LOGISTICS_PR${{ env.PR_NUMBER }} dropped" >> $GITHUB_STEP_SUMMARY

    - name: Drop ephemeral roles
      run: |
        ROLES=(
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_OWNER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_CUSTOMERS_WRITER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_CUSTOMERS_READER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_SHIPMENTS_WRITER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_SHIPMENTS_READER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_FLEET_WRITER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_FLEET_READER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_LOCATIONS_WRITER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_LOCATIONS_READER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_ORDERS_WRITER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_ORDERS_READER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_PRODUCTS_WRITER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_PRODUCTS_READER"
          "DP_SFG_LOGISTICS_PR${{ env.PR_NUMBER }}_OPEN_TRANSPORT_READER"
        )

        for ROLE in "${ROLES[@]}"; do
          snow sql -q "DROP ROLE IF EXISTS $ROLE" -x 2>/dev/null || true
        done

        echo "Ephemeral roles cleaned up" >> $GITHUB_STEP_SUMMARY

  COMMENT_ON_PR:
    needs: TEARDOWN
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post cleanup confirmation
        uses: actions/github-script@v7
        env:
          TEARDOWN_RESULT: ${{ needs.TEARDOWN.result }}
        with:
          script: |
            const result = process.env.TEARDOWN_RESULT;
            const status = result === 'success' ? 'PASS' : 'FAIL';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let comment = `### DCM Ephemeral Teardown - PR #${context.issue.number}\n\n`;
            comment += `| Action | Result |\n|--------|--------|\n`;
            comment += `| Drop DCM project | ${status} |\n`;
            comment += `| Drop database SFG_LOGISTICS_PR${context.issue.number} | ${status} |\n`;
            comment += `| Drop ephemeral roles | ${status} |\n`;
            comment += `\n[View full workflow run](${runUrl})`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
